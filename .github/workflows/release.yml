name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Set version and build JAR
        id: build
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mvn versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false
          mvn clean package -DskipTests
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: jar-artifact
          path: target/invenova-barcode-print-agent-${{ steps.build.outputs.VERSION }}.jar

      - uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: target/invenova-barcode-print-agent-${{ steps.build.outputs.VERSION }}.jar

  build-windows-installer:
    needs: build-and-release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          name: jar-artifact
          path: target/

      - name: Build minimal JRE and Windows installer
        run: |
          jlink `
            --add-modules java.base,jdk.httpserver,java.net.http,java.logging,jdk.crypto.ec,jdk.localedata `
            --strip-debug --no-header-files --no-man-pages --include-locales en `
            --output target\jre-minimal

          jpackage `
            --input target --name BarcodeAgent `
            --main-jar invenova-barcode-print-agent-${{ steps.version.outputs.VERSION }}.jar `
            --main-class com.invenova.barcode.BarcodeAgentApp `
            --type exe --dest target/installer --runtime-image target\jre-minimal `
            --icon src\main\resources\icon.ico `
            --java-options "-Xmx512m" `
            --win-menu --win-menu-group "Invenova" --win-shortcut --win-per-user-install `
            --vendor "Invenova" --description "Barcode Print Agent" `
            --app-version "${{ steps.version.outputs.VERSION }}"

      - uses: softprops/action-gh-release@v2
        with:
          files: target/installer/BarcodeAgent*.exe
